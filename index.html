<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/jpeg" href="/img/LOGO.jpg">
    <title>首页 - 小夏的个人空间</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- 导航栏 -->
    <nav class="navbar" id="navbar">
        <div class="container">
            <div class="nav-content">
                <!-- 桌面端导航 -->
                <div class="nav-pills desktop-nav">
                    <a href="/" class="nav-link active" data-page="home">主页</a>
                    <a href="/blog" class="nav-link" data-page="blog">文章</a>
                    <a href="/guestbook" class="nav-link" data-page="guestbook">留言</a>
                    <a href="/about" class="nav-link" data-page="about">关于</a>
                </div>

                <!-- 右上角控制区 -->
                <div class="nav-controls">
                    <button id="theme-toggle" class="theme-toggle" title="切换主题">
                        <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                        </svg>
                        <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                        </svg>
                    </button>

                    <!-- 移动端菜单按钮 -->
                    <button id="mobile-menu-toggle" class="mobile-menu-toggle">
                        <svg class="hamburger-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                        <svg class="close-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>

                <!-- 移动端菜单 -->
                <div class="mobile-nav" id="mobile-nav">
                    <a href="/" class="mobile-nav-link" data-page="home">主页</a>
                    <a href="blog/" class="mobile-nav-link" data-page="blog">文章</a>
                    <a href="guestbook/" class="mobile-nav-link" data-page="guestbook">留言</a>
                    <a href="about/" class="mobile-nav-link" data-page="about">关于</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主内容区 -->
    <main class="main-content">
        <div class="container">
            <!-- Hero Section -->
            <section class="hero-section">
                <div class="hero-content">
                    <div class="profile-info">
                        <img src="/img/LOGO.jpg" alt="Logo" class="profile-avatar">
                        <div class="profile-text">
                            <h1 class="signature"><span id="typing-text"></span></h1>
                            <!-- <p class="quote">若非心胸宽广如海，人生如何能保持风平浪静。</p> -->
                        </div>
                    </div>
                </div>
            </section>

            <!-- 关于我卡片 -->
            <section class="section" id="about-section">
                <div class="card">
                    <h2 class="section-title">关于我 | About Me</h2>

                    <div class="card-section">
                        <h3 class="card-subtitle">自我介绍 | Profile</h3>
                        <p class="card-text">专业信息安全，主攻各种环境部署、CTF、服务器运维、渗透测试方向</p>
                    </div>

                    <div class="card-section">
                        <h3 class="card-subtitle">基础信息 | Basic Info</h3>
                        <div class="info-grid">
                            <div class="info-item">
                                <span>中国山东省滨州市 | BinZhou, Shandong, China</span>
                            </div>
                            <div class="info-item">
                                <span class="info-icon">🎂</span>
                                <span>丙戌年正月十九 | 2006.02.16</span>
                            </div>
                            <div class="info-item">
                                <span class="info-icon">📚</span>
                                <span>SDCIT</span>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 我的技能卡片 -->
            <section class="section">
                <div class="card">
                    <h2 class="section-title">我的技能 | My Skills</h2>

                    <div class="card-section">
                        <h3 class="card-subtitle">操作系统 | OS</h3>
                        <div class="badges">
                            <img src="https://img.shields.io/badge/Windows-0078D6?logo=microsoft&logoColor=white"
                                alt="Windows">
                            <img src="https://img.shields.io/badge/Linux-FCC624?logo=linux&logoColor=black" alt="Linux">
                        </div>
                    </div>

                    <div class="card-section">
                        <h3 class="card-subtitle">常用开发语言 | Common Programming Languages</h3>
                        <div class="badges">
                            <img src="https://img.shields.io/badge/Python-3776AB?logo=python&logoColor=white"
                                alt="Python">
                            <img src="https://img.shields.io/badge/HTML5-E34F26?logo=html5&logoColor=white" alt="HTML5">
                            <img src="https://img.shields.io/badge/JavaScript-F7DF1E?logo=javascript&logoColor=black"
                                alt="JavaScript">
                            <img src="https://img.shields.io/badge/PHP-777BB4?logo=php&logoColor=white" alt="PHP">
                            <img src="https://img.shields.io/badge/Docker-2496ED?logo=docker&logoColor=white"
                                alt="Docker">
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 小夏的个人空间</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        // 打字机效果
        document.addEventListener('DOMContentLoaded', function() {
            const text = "Welcome to 小夏的个人空间";
            const typingElement = document.getElementById('typing-text');
            let index = 0;
            
            function typeText() {
                if (index < text.length) {
                    typingElement.textContent += text.charAt(index);
                    index++;
                    setTimeout(typeText, 100);
                }
            }
            
            // 延迟开始打字
            setTimeout(typeText, 500);
        });
    </script>
</body>

</html>
